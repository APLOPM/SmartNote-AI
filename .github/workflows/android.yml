name: Android CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

concurrency:
  group: android-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - name: Detect Android Gradle project
        id: detect
        run: |
          set -euo pipefail
          if [ -f gradlew ] && ([ -f settings.gradle ] || [ -f settings.gradle.kts ] || [ -d app ]); then
            echo "should_run=true" >> "$GITHUB_OUTPUT"
          else
            echo "should_run=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Skip Android CI: gradlew or Android project files not found at the repository root."
          fi

      - name: Set up JDK 17
        if: steps.detect.outputs.should_run == 'true'
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        if: steps.detect.outputs.should_run == 'true'
        run: chmod +x gradlew

      - name: Build with Gradle
        if: steps.detect.outputs.should_run == 'true'
        run: ./gradlew build --stacktrace
