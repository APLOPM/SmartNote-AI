name: Asynchronous CI fallback replay

on:
  workflow_run:
    workflows: ["CI", "Deploy"]
    types:
      - completed
  workflow_dispatch:

permissions:
  contents: read

jobs:
  replay:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'failure' }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    continue-on-error: true
    strategy:
      fail-fast: false
      max-parallel: 4
      matrix:
        replay_target:
          - docs
          - workflow_inventory
          - ci_reliability
          - autoscaling_assets
          - homepage_ux
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node for advisory replay
        if: matrix.replay_target == 'ci_reliability'
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies if present
        if: matrix.replay_target == 'ci_reliability'
        run: |
          set -euo pipefail
          retry() {
            local max_attempts="$1"
            shift
            local attempt=1
            until "$@"; do
              if [ "$attempt" -ge "$max_attempts" ]; then
                echo "::warning::Replay command still failed after ${attempt} attempts: $*"
                return 0
              fi
              echo "::warning::Replay command failed (attempt ${attempt}/${max_attempts}), retrying in $((attempt * 5))s: $*"
              sleep $((attempt * 5))
              attempt=$((attempt + 1))
            done
          }

          if [ -f package-lock.json ]; then
            retry 3 npm ci --no-audit --no-fund
          elif [ -f package.json ]; then
            retry 3 npm install --no-audit --no-fund
          else
            echo "::notice::Skipping npm install replay because package.json is not present."
          fi

      - name: Replay docs validation target
        if: matrix.replay_target == 'docs'
        run: |
          set -euo pipefail
          python3 scripts/validate_readme_ux.py

      - name: Replay workflow inventory validation target
        if: matrix.replay_target == 'workflow_inventory'
        run: |
          set -euo pipefail
          python3 scripts/validate_workflow_inventory.py

      - name: Replay CI reliability target
        if: matrix.replay_target == 'ci_reliability'
        run: |
          set -euo pipefail
          npm run validate:ci-reliability

      - name: Replay autoscaling advisory target
        if: matrix.replay_target == 'autoscaling_assets'
        run: |
          set -euo pipefail
          test -f k8s/autoscaling/hpa-llm-cpu-rps.yaml
          test -f k8s/autoscaling/keda-kafka-autoscaling.yaml
          test -f k8s/autoscaling/alerts-prometheus-rules.yaml

      - name: Replay first-use homepage UX target
        if: matrix.replay_target == 'homepage_ux'
        run: |
          set -euo pipefail
          test -f docs/smartnote-homepage-first-use-mockup.html
          rg -q "First-Use Homepage UX \(TH/EN\)" docs/smartnote-homepage-first-use-mockup.html
          rg -q "Human Confirmation \\+ UX Security Guardrails" docs/smartnote-homepage-first-use-mockup.html

      - name: Emit replay status notice
        run: |
          echo "::notice::Fallback replay target '${{ matrix.replay_target }}' completed. Matrix replay scales rechecks without blocking delivery."
