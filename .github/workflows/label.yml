name: Labeler

on:
  pull_request_target:
    types: [opened, synchronize, reopened]
  workflow_dispatch:

jobs:
  label:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: ติดฉลาก Pull Request อัตโนมัติ
        uses: actions/labeler@v6.0.1
