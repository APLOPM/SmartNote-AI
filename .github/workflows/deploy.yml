name: Deploy

on:
  workflow_run:
    workflows: ["Build & Push"]
    types:
      - completed
  workflow_dispatch:
    inputs:
      deploy_sha:
        description: "Commit SHA to deploy (optional for manual runs)"
        required: false
        type: string

concurrency:
  group: production-deploy
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  deploy:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      DEPLOY_SHA: ${{ inputs.deploy_sha || github.event.workflow_run.head_sha || github.sha }}

    steps:
      - uses: actions/checkout@v4

      - name: Validate deploy prerequisites
        env:
          KUBE_CONFIG_B64: ${{ secrets.KUBE_CONFIG }}
        run: |
          set -euo pipefail
          if [ -z "${KUBE_CONFIG_B64}" ]; then
            echo "::error::Missing secret KUBE_CONFIG"
            exit 1
          fi
          test -f k8s/cicd/prisma-migrate-job.yaml
          test -f k8s/autoscaling/deployments-resources-and-rollout.yaml

      - name: Normalize image prefix
        run: |
          echo "IMAGE_PREFIX=ghcr.io/$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_ENV"

      - name: Setup kubectl
        uses: azure/setup-kubectl@v4

      - name: Configure kubeconfig
        run: |
          set -euo pipefail
          mkdir -p ~/.kube
          echo "${{ secrets.KUBE_CONFIG }}" | base64 -d > ~/.kube/config

      - name: Run migration job (before rollout)
        run: |
          set -euo pipefail
          retry() {
            local max_attempts="$1"
            shift
            local attempt=1
            until "$@"; do
              if [ "$attempt" -ge "$max_attempts" ]; then
                echo "::error::Command failed after ${attempt} attempts: $*"
                return 1
              fi
              echo "::warning::Command failed (attempt ${attempt}/${max_attempts}), retrying in $((attempt * 10))s"
              sleep $((attempt * 10))
              attempt=$((attempt + 1))
            done
          }

          kubectl delete job prisma-migrate --ignore-not-found=true
          API_IMAGE="$IMAGE_PREFIX/api:$DEPLOY_SHA"
          retry 3 sh -c 'sed "s|__API_IMAGE__|'"$API_IMAGE"'|g" k8s/cicd/prisma-migrate-job.yaml | kubectl apply -f -'
          retry 3 kubectl wait --for=condition=complete --timeout=300s job/prisma-migrate

      - name: Set image tags (immutable SHA only)
        run: |
          set -euo pipefail
          for svc in api embedding retrieval llm outbox; do
            if kubectl get deployment "$svc" >/dev/null 2>&1; then
              kubectl set image deployment/$svc \
                $svc=$IMAGE_PREFIX/$svc:$DEPLOY_SHA
            else
              echo "::notice::Skip image update for deployment/$svc because it does not exist in the target cluster."
            fi
          done

      - name: Apply autoscaling baseline
        run: |
          set -euo pipefail
          retry() {
            local max_attempts="$1"
            shift
            local attempt=1
            until "$@"; do
              if [ "$attempt" -ge "$max_attempts" ]; then
                echo "::error::Command failed after ${attempt} attempts: $*"
                return 1
              fi
              echo "::warning::Command failed (attempt ${attempt}/${max_attempts}), retrying in $((attempt * 10))s"
              sleep $((attempt * 10))
              attempt=$((attempt + 1))
            done
          }

          retry 3 kubectl apply -f k8s/autoscaling/deployments-resources-and-rollout.yaml
          retry 3 kubectl apply -f k8s/autoscaling/hpa-llm-cpu-rps.yaml
          retry 3 kubectl apply -f k8s/autoscaling/keda-kafka-autoscaling.yaml
          retry 3 kubectl apply -f k8s/autoscaling/alerts-prometheus-rules.yaml

      - name: Wait rollout
        run: |
          set -euo pipefail
          retry() {
            local max_attempts="$1"
            shift
            local attempt=1
            until "$@"; do
              if [ "$attempt" -ge "$max_attempts" ]; then
                echo "::error::Command failed after ${attempt} attempts: $*"
                return 1
              fi
              echo "::warning::Rollout check failed (attempt ${attempt}/${max_attempts}), retrying in $((attempt * 10))s"
              sleep $((attempt * 10))
              attempt=$((attempt + 1))
            done
          }

          for svc in api embedding retrieval llm outbox; do
            if kubectl get deployment "$svc" >/dev/null 2>&1; then
              retry 3 kubectl rollout status deployment/$svc --timeout=300s
            fi
          done

      - name: Smoke test (API + DB + Kafka)
        run: |
          set -euo pipefail
          retry() {
            local max_attempts="$1"
            shift
            local attempt=1
            until "$@"; do
              if [ "$attempt" -ge "$max_attempts" ]; then
                echo "::error::Command failed after ${attempt} attempts: $*"
                return 1
              fi
              echo "::warning::Command failed (attempt ${attempt}/${max_attempts}), retrying in $((attempt * 10))s"
              sleep $((attempt * 10))
              attempt=$((attempt + 1))
            done
          }

          kubectl delete pod smoke-test --ignore-not-found=true
          retry 3 kubectl run smoke-test \
            --image=$IMAGE_PREFIX/api:$DEPLOY_SHA \
            --restart=Never \
            --command -- npm run smoke:test
          kubectl wait --for=condition=Ready --timeout=180s pod/smoke-test || true
          kubectl wait --for=condition=ContainersReady --timeout=180s pod/smoke-test || true
          retry 3 kubectl wait --for=condition=Succeeded --timeout=600s pod/smoke-test
          kubectl logs smoke-test || true
          kubectl delete pod smoke-test --ignore-not-found=true

      - name: Rollback on failure
        if: ${{ failure() }}
        run: |
          for svc in api embedding retrieval llm outbox; do
            kubectl rollout undo deployment/$svc || true
          done
          exit 1
