name: NodeJS with Webpack

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [18.x, 20.x, 22.x]

    steps:
      - uses: actions/checkout@v4

      - name: Detect webpack project
        id: detect
        run: |
          if [ -f package.json ]; then
            echo "has_package_json=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_package_json=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Skip webpack build: package.json not found at repository root."
          fi

      - name: Use Node.js ${{ matrix.node-version }}
        if: steps.detect.outputs.has_package_json == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        if: steps.detect.outputs.has_package_json == 'true'
        run: npm ci

      - name: Build with webpack
        if: steps.detect.outputs.has_package_json == 'true'
        run: npx webpack
