name: NodeJS with Webpack

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

env:
  CI_RETRY_MAX: 3
  CI_RETRY_BACKOFF_SECONDS: 5

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    strategy:
      fail-fast: false
      max-parallel: 2
      matrix:
        node-version: [18.x, 20.x, 22.x]

    steps:
      - uses: actions/checkout@v4

      - name: Detect webpack project
        id: detect
        run: |
          set -euo pipefail
          if [ -f package.json ] && rg -q '"webpack"' package.json; then
            echo "has_package_json=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_package_json=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Skip webpack build: package.json with webpack dependency/script not found at repository root."
          fi

      - name: Use Node.js ${{ matrix.node-version }}
        if: steps.detect.outputs.has_package_json == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies (retry)
        if: steps.detect.outputs.has_package_json == 'true'
        run: |
          set -euo pipefail
          retry() {
            local max_attempts="$1"
            shift
            local attempt=1
            until "$@"; do
              if [ "$attempt" -ge "$max_attempts" ]; then
                echo "::error::Command failed after ${attempt} attempts: $*"
                return 1
              fi
              echo "::warning::Command failed (attempt ${attempt}/${max_attempts}), retrying in $((attempt * CI_RETRY_BACKOFF_SECONDS))s"
              sleep $((attempt * CI_RETRY_BACKOFF_SECONDS))
              attempt=$((attempt + 1))
            done
          }

          if [ -f package-lock.json ]; then
            retry "$CI_RETRY_MAX" npm ci --no-audit --no-fund
          else
            retry "$CI_RETRY_MAX" npm install --no-audit --no-fund
          fi

      - name: Build with webpack
        if: steps.detect.outputs.has_package_json == 'true'
        run: npx webpack
