name: Build & Push

on:
  push:
    branches: [main]

env:
  REGISTRY: ghcr.io

jobs:
  docker:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - service: api
            context: .

    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Normalize image prefix
        run: |
          echo "IMAGE_PREFIX=${REGISTRY}/$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_ENV"

      - name: Login Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Image (immutable SHA tag)
        run: |
          docker build \
            -t $IMAGE_PREFIX/${{ matrix.service }}:${{ github.sha }} \
            ${{ matrix.context }}

      - name: Push Image
        run: |
          docker push \
            $IMAGE_PREFIX/${{ matrix.service }}:${{ github.sha }}
