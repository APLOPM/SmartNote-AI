name: Build & Push

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io

jobs:
  docker:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    strategy:
      fail-fast: false
      matrix:
        include:
          - service: api
            context: .

    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Detect buildable service
        id: detect
        run: |
          set -euo pipefail
          dockerfile="${{ matrix.context }}/Dockerfile"
          if [ -f "$dockerfile" ]; then
            echo "buildable=true" >> "$GITHUB_OUTPUT"
            echo "dockerfile=$dockerfile" >> "$GITHUB_OUTPUT"
          else
            echo "buildable=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Skip image build for ${{ matrix.service }}: $dockerfile not found."
          fi

      - name: Normalize image prefix
        if: steps.detect.outputs.buildable == 'true'
        run: |
          echo "IMAGE_PREFIX=${REGISTRY}/$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_ENV"

      - name: Login Registry
        if: steps.detect.outputs.buildable == 'true'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Image (immutable SHA tag)
        if: steps.detect.outputs.buildable == 'true'
        run: |
          docker build \
            -f ${{ steps.detect.outputs.dockerfile }} \
            -t $IMAGE_PREFIX/${{ matrix.service }}:${{ github.sha }} \
            ${{ matrix.context }}

      - name: Push Image
        if: steps.detect.outputs.buildable == 'true'
        run: |
          docker push \
            $IMAGE_PREFIX/${{ matrix.service }}:${{ github.sha }}
