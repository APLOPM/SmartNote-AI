name: CI

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  workflow-health:
    name: ตรวจสอบความเสถียรของ GitHub Actions
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Validate workflow syntax with actionlint
        uses: rhysd/actionlint@v1

      - name: Validate critical workflow files exist
        run: |
          set -euo pipefail
          test -f .github/workflows/ci.yml
          test -f .github/workflows/dependency-review.yml
          test -f .github/workflows/deploy.yml

  docs-mockups:
    name: ตรวจสอบหน้า mockup
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - name: Validate mockup files exist
        run: |
          test -f docs/smartnote-serene-dashboard-mockup.html
          test -f docs/smartnote-serene-search-mockup.html

      - name: Validate baseline UX spec docs and README mapping
        run: |
          set -euo pipefail
          test -f docs/ai-ux-design-system-th.md
          test -f docs/editor-ui-mockup.html
          rg -q "UX Specification Baseline \(Always Included\)" README.md
          rg -q "AI Safety UX Requirements \(Baseline\)" README.md
          rg -q "docs/ai-ux-design-system-th.md" README.md
          rg -q "docs/smartnote-serene-dashboard-mockup.html" README.md
          rg -q "docs/smartnote-serene-search-mockup.html" README.md
          rg -q "docs/editor-ui-mockup.html" README.md

  dependency-guardrails:
    name: ตรวจสอบการพึ่งพา
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - name: Ensure dependency review workflow is present and pinned
        run: |
          set -euo pipefail
          test -f .github/workflows/dependency-review.yml
          rg -q "uses: actions/dependency-review-action@v4" .github/workflows/dependency-review.yml
          rg -q "pull_request:" .github/workflows/dependency-review.yml

  build-test:
    name: สร้าง-ทดสอบ (${{ matrix.service_label }})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - service: api
            service_label: api
          - service: embedding
            service_label: ฝังตัว
          - service: retrieval
            service_label: การดึงข้อมูล
          - service: llm
            service_label: llm
          - service: outbox
            service_label: กล่องขาออก

    defaults:
      run:
        shell: bash

    steps:
      - uses: actions/checkout@v4

      - name: Detect service path
        id: detect
        run: |
          lockfile=""
          service_dir=""
          prisma_schema=""

          if [ -f "services/${{ matrix.service }}/package.json" ]; then
            service_dir="services/${{ matrix.service }}"
            lockfile="$service_dir/package-lock.json"
            prisma_schema="../../prisma/schema.prisma"
          elif [ -f "src/services/${{ matrix.service }}/package.json" ]; then
            service_dir="src/services/${{ matrix.service }}"
            lockfile="$service_dir/package-lock.json"
            prisma_schema="../../../prisma/schema.prisma"
          else
            echo "should_run=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Skip ${{ matrix.service }}: package.json not found in services/ or src/services/."
            exit 0
          fi

          echo "service_dir=$service_dir" >> "$GITHUB_OUTPUT"
          echo "prisma_schema=$prisma_schema" >> "$GITHUB_OUTPUT"

          if [ -f "$lockfile" ]; then
            echo "lockfile=$lockfile" >> "$GITHUB_OUTPUT"
            echo "has_lockfile=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_lockfile=false" >> "$GITHUB_OUTPUT"
            echo "::notice::No package-lock.json for ${{ matrix.service }}. Falling back to npm install."
          fi

          echo "should_run=true" >> "$GITHUB_OUTPUT"

      - name: Setup Node
        if: steps.detect.outputs.should_run == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Restore npm cache (lockfile only)
        if: steps.detect.outputs.should_run == 'true' && steps.detect.outputs.has_lockfile == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: ${{ steps.detect.outputs.lockfile }}

      - name: Install
        if: steps.detect.outputs.should_run == 'true'
        run: |
          cd "${{ steps.detect.outputs.service_dir }}"
          if [ "${{ steps.detect.outputs.has_lockfile }}" = "true" ]; then
            npm ci
          else
            npm install
          fi

      - name: Lint
        if: steps.detect.outputs.should_run == 'true'
        run: |
          cd "${{ steps.detect.outputs.service_dir }}"
          npm run lint

      - name: Test
        if: steps.detect.outputs.should_run == 'true'
        run: |
          cd "${{ steps.detect.outputs.service_dir }}"
          npm run test

      - name: Build
        if: steps.detect.outputs.should_run == 'true'
        run: |
          cd "${{ steps.detect.outputs.service_dir }}"
          npm run build

      - name: Prisma Validate
        if: steps.detect.outputs.should_run == 'true'
        run: |
          cd "${{ steps.detect.outputs.service_dir }}"
          npx prisma validate --schema="${{ steps.detect.outputs.prisma_schema }}"
