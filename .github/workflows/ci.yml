name: CI

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  CI_RETRY_MAX: 3
  CI_RETRY_BACKOFF_SECONDS: 5

jobs:
  workflow-health:
    name: ตรวจสอบความเสถียรของ GitHub Actions
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Validate workflow syntax with actionlint
        uses: rhysd/actionlint@v1.7.7

      - name: Validate critical workflow files exist
        run: |
          set -euo pipefail
          test -f .github/workflows/ci.yml
          test -f .github/workflows/dependency-review.yml
          test -f .github/workflows/deploy.yml
          test -f .github/workflows/build.yml
          test -f .github/workflows/webpack.yml

  docs-mockups:
    name: ตรวจสอบหน้า mockup
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - name: Validate mockup files exist
        run: |
          set -euo pipefail
          test -f docs/smartnote-serene-dashboard-mockup.html
          test -f docs/smartnote-serene-search-mockup.html
          test -f docs/editor-ui-mockup.html

      - name: Validate baseline UX spec docs and README mapping
        run: |
          set -euo pipefail
          test -f docs/ai-ux-design-system-th.md
          rg -q "UX Specification Baseline \(Always Included\)" README.md
          rg -q "Bilingual Conversational UX Baseline \(TH/EN\)" README.md
          rg -q "docs/ai-ux-design-system-th.md" README.md
          rg -q "docs/smartnote-serene-dashboard-mockup.html" README.md
          rg -q "docs/smartnote-serene-search-mockup.html" README.md
          rg -q "docs/editor-ui-mockup.html" README.md
          rg -q "Progressive Disclosure \(Benefit-first\)" README.md
          rg -q "Contextual Awareness \(2-3 day return\)" README.md
          rg -q "Privacy Assurance \(Standard A\)" README.md
          rg -q "AI Safety UX Standard A" README.md
          rg -q "TH: ใช้ภาษาไทยที่เป็นธรรมชาติ" README.md
          rg -q "EN: Use clear, concise English" README.md

      - name: Enforce UX Safety Standard A markers
        run: |
          set -euo pipefail
          rg -q "AI Safety UX Standard A" docs/ai-ux-design-system-th.md
          rg -q "Design Tokens" docs/ai-ux-design-system-th.md
          rg -q "Human Confirmation" docs/ai-ux-design-system-th.md
          rg -q "Conversational Onboarding Baseline \(TH/EN\)" docs/ai-ux-design-system-th.md
          rg -q "Progressive Disclosure" docs/ai-ux-design-system-th.md
          rg -q "Contextual Awareness" docs/ai-ux-design-system-th.md
          rg -q "Privacy Assurance" docs/ai-ux-design-system-th.md

  dependency-guardrails:
    name: ตรวจสอบการพึ่งพา
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - name: Ensure dependency review workflow is present and pinned
        run: |
          set -euo pipefail
          test -f .github/workflows/dependency-review.yml
          rg -q "uses: actions/dependency-review-action@v4" .github/workflows/dependency-review.yml
          rg -q "fail-on-severity: moderate" .github/workflows/dependency-review.yml
          rg -q "pull_request:" .github/workflows/dependency-review.yml

  build-test:
    name: สร้าง-ทดสอบ (${{ matrix.service }})
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      max-parallel: ${{ github.event_name == 'pull_request' && 3 || 1 }}
      matrix:
        include:
          - service: api

    defaults:
      run:
        shell: bash

    steps:
      - uses: actions/checkout@v4

      - name: Detect service path
        id: detect
        run: |
          set -euo pipefail
          lockfile=""
          service_dir=""

          if [ -f "services/${{ matrix.service }}/package.json" ]; then
            service_dir="services/${{ matrix.service }}"
            lockfile="$service_dir/package-lock.json"
          elif [ -f "src/services/${{ matrix.service }}/package.json" ]; then
            service_dir="src/services/${{ matrix.service }}"
            lockfile="$service_dir/package-lock.json"
          elif [ -f "package.json" ]; then
            service_dir="."
            lockfile="package-lock.json"
          else
            echo "should_run=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Skip ${{ matrix.service }}: package.json not found in services/ or src/services/."
            exit 0
          fi

          echo "service_dir=$service_dir" >> "$GITHUB_OUTPUT"
          if [ -f "$lockfile" ]; then
            echo "lockfile=$lockfile" >> "$GITHUB_OUTPUT"
            echo "has_lockfile=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_lockfile=false" >> "$GITHUB_OUTPUT"
          fi
          echo "should_run=true" >> "$GITHUB_OUTPUT"

      - name: Setup Node (with npm cache)
        if: steps.detect.outputs.should_run == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: ${{ steps.detect.outputs.lockfile || 'package-lock.json' }}

      - name: Install dependencies (with retry and lockfile fallback)
        if: steps.detect.outputs.should_run == 'true'
        run: |
          set -euo pipefail

          retry() {
            local max_attempts="$1"
            shift
            local attempt=1
            until "$@"; do
              if [ "$attempt" -ge "$max_attempts" ]; then
                echo "::error::Command failed after ${attempt} attempts: $*"
                return 1
              fi
              echo "::warning::Command failed (attempt ${attempt}/${max_attempts}), retrying in $((attempt * CI_RETRY_BACKOFF_SECONDS))s: $*"
              sleep $((attempt * CI_RETRY_BACKOFF_SECONDS))
              attempt=$((attempt + 1))
            done
          }

          cd "${{ steps.detect.outputs.service_dir }}"
          if [ "${{ steps.detect.outputs.has_lockfile }}" = "true" ]; then
            retry "$CI_RETRY_MAX" npm ci --no-audit --no-fund
          else
            retry "$CI_RETRY_MAX" npm install --no-audit --no-fund
          fi

      - name: Lint (retry)
        if: steps.detect.outputs.should_run == 'true'
        run: |
          set -euo pipefail
          cd "${{ steps.detect.outputs.service_dir }}"
          npm run lint --if-present

      - name: Test (retry)
        if: steps.detect.outputs.should_run == 'true'
        run: |
          set -euo pipefail
          cd "${{ steps.detect.outputs.service_dir }}"
          npm run test --if-present

      - name: Prisma Validate
        if: steps.detect.outputs.should_run == 'true'
        run: |
          set -euo pipefail
          schema_path="${{ steps.detect.outputs.service_dir }}/prisma/schema.prisma"
          if [ -f "$schema_path" ]; then
            npx prisma validate --schema="$schema_path"
          elif [ -f "prisma/schema.prisma" ]; then
            npx prisma validate --schema="prisma/schema.prisma"
          else
            echo "::notice::Skip Prisma validate: prisma/schema.prisma not found."
          fi

  ci-elastic-fallback-checks:
    name: CI elastic fallback checks (non-blocking)
    runs-on: ubuntu-latest
    continue-on-error: true
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - name: Validate autoscaling manifests for CI/CD readiness
        run: |
          set -euo pipefail
          test -f k8s/autoscaling/hpa-llm-cpu-rps.yaml
          test -f k8s/autoscaling/keda-kafka-autoscaling.yaml
          test -f k8s/autoscaling/alerts-prometheus-rules.yaml
          rg -q "autoscaling" README.md
