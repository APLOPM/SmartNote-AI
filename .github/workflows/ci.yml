name: CI

on:
  pull_request:
    branches: [main]

jobs:
  build-test:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        service: [api, embedding, retrieval, llm, outbox]

    defaults:
      run:
        shell: bash

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: services/${{ matrix.service }}/package-lock.json

      - name: Install
        run: |
          cd services/${{ matrix.service }}
          npm ci

      - name: Lint
        run: |
          cd services/${{ matrix.service }}
          npm run lint

      - name: Test
        run: |
          cd services/${{ matrix.service }}
          npm run test

      - name: Prisma Validate
        run: |
          cd services/${{ matrix.service }}
          npx prisma validate --schema=../../prisma/schema.prisma
