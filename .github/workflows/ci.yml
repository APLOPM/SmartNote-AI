name: CI

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-test:
    name: สร้าง-ทดสอบ (${{ matrix.service_label }})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - service: api
            service_label: api
          - service: embedding
            service_label: ฝังตัว
          - service: retrieval
            service_label: การดึงข้อมูล
          - service: llm
            service_label: llm
          - service: outbox
            service_label: กล่องขาออก

    defaults:
      run:
        shell: bash

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: services/${{ matrix.service }}/package-lock.json

      - name: Install
        run: |
          cd services/${{ matrix.service }}
          npm ci

      - name: Lint
        run: |
          cd services/${{ matrix.service }}
          npm run lint

      - name: Test
        run: |
          cd services/${{ matrix.service }}
          npm run test

      - name: Build
        run: |
          cd services/${{ matrix.service }}
          npm run build

      - name: Prisma Validate
        run: |
          cd services/${{ matrix.service }}
          npx prisma validate --schema=../../prisma/schema.prisma
