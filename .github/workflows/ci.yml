name: CI

on:
  pull_request:
    branches: [main]

jobs:
  build-test:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - service: api
            path: .

    defaults:
      run:
        shell: bash

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: ${{ matrix.path }}/package-lock.json

      - name: Install
        run: |
          cd ${{ matrix.path }}
          npm ci

      - name: Lint
        run: |
          cd ${{ matrix.path }}
          npm run lint

      - name: Test
        run: |
          cd ${{ matrix.path }}
          npm run test

      - name: Prisma Validate
        run: |
          cd ${{ matrix.path }}
          npx prisma validate --schema=prisma/schema.prisma
