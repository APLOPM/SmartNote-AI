version: "3.9"

services:
  postgres:
    image: postgres:16
    container_name: rag_postgres
    restart: always
    environment:
      POSTGRES_USER: rag
      POSTGRES_PASSWORD: rag
      POSTGRES_DB: ragdb
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_MIN_INSYNC_REPLICAS: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1

  api:
    build: ./services/api
    environment:
      DATABASE_URL: postgres://rag:rag@postgres:5432/ragdb
      KAFKA_BROKERS: kafka:9092
    depends_on:
      - postgres
      - kafka

  outbox-publisher:
    build: ./services/outbox
    environment:
      DATABASE_URL: postgres://rag:rag@postgres:5432/ragdb
      KAFKA_BROKERS: kafka:9092
    depends_on:
      - postgres
      - kafka

  embedding-service:
    build: ./services/embedding
    environment:
      DATABASE_URL: postgres://rag:rag@postgres:5432/ragdb
      KAFKA_BROKERS: kafka:9092
    depends_on:
      - postgres
      - kafka

  retrieval-service:
    build: ./services/retrieval
    environment:
      DATABASE_URL: postgres://rag:rag@postgres:5432/ragdb
      KAFKA_BROKERS: kafka:9092
    depends_on:
      - postgres
      - kafka

  llm-orchestrator:
    build: ./services/llm
    environment:
      DATABASE_URL: postgres://rag:rag@postgres:5432/ragdb
      KAFKA_BROKERS: kafka:9092
    depends_on:
      - postgres
      - kafka

volumes:
  pgdata:
