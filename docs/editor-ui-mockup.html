<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SmartNote AI - Editor</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&amp;display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
      rel="stylesheet"
    />
    <script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              primary: "#1152d4",
              "background-light": "#f6f6f8",
              "background-dark": "#101622",
            },
            fontFamily: {
              display: ["Inter", "sans-serif"],
            },
            borderRadius: {
              DEFAULT: "0.25rem",
              lg: "0.5rem",
              xl: "0.75rem",
              full: "9999px",
            },
          },
        },
      };
    </script>
    <style>
      body {
        min-height: max(884px, 100dvh);
      }
    </style>
  </head>
  <body
    class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 antialiased"
  >
    <div class="relative flex h-screen w-full flex-col bg-white dark:bg-background-dark overflow-hidden">
      <header
        class="flex items-center justify-between px-4 py-3 border-b border-slate-100 dark:border-slate-800 bg-white/80 dark:bg-background-dark/80 backdrop-blur-md sticky top-0 z-10"
      >
        <div class="flex items-center gap-3">
          <button
            class="flex items-center justify-center size-10 rounded-full hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors"
          >
            <span class="material-symbols-outlined text-slate-600 dark:text-slate-400">arrow_back</span>
          </button>
          <div>
            <h1 class="text-sm font-semibold text-slate-900 dark:text-slate-100">Project Strategy 2024</h1>
            <p class="text-[10px] text-slate-500 uppercase tracking-wider font-medium">Drafting • Saved 2m ago</p>
          </div>
        </div>
        <div class="flex items-center gap-1">
          <button
            class="flex items-center gap-1.5 px-3 py-1.5 rounded-lg text-primary font-semibold text-sm hover:bg-primary/10 transition-colors"
          >
            <span class="material-symbols-outlined text-[20px]">share</span>
            <span>Share</span>
          </button>
          <button class="flex items-center justify-center size-10 rounded-full hover:bg-slate-100 dark:hover:bg-slate-800">
            <span class="material-symbols-outlined text-slate-600 dark:text-slate-400">more_vert</span>
          </button>
        </div>
      </header>

      <main class="flex-1 overflow-y-auto px-6 py-6 space-y-6">
        <div class="flex flex-wrap gap-2">
          <div
            class="flex items-center gap-1.5 px-2.5 py-1 rounded-full bg-primary/10 border border-primary/20 text-primary text-xs font-semibold"
          >
            <span class="material-symbols-outlined text-[16px]">auto_awesome</span>
            <span>AI Tagged: Business</span>
          </div>
          <div
            class="flex items-center gap-1.5 px-2.5 py-1 rounded-full bg-slate-100 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 text-slate-600 dark:text-slate-400 text-xs font-semibold"
          >
            <span class="material-symbols-outlined text-[16px]">mic_none</span>
            <span>Voice to Text</span>
          </div>
          <div
            class="flex items-center gap-1.5 px-2.5 py-1 rounded-full bg-slate-100 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 text-slate-600 dark:text-slate-400 text-xs font-semibold"
          >
            <span class="material-symbols-outlined text-[16px]">tag</span>
            <span>Strategy</span>
          </div>
        </div>

        <div class="space-y-4">
          <input
            class="w-full bg-transparent border-none p-0 text-3xl font-bold text-slate-900 dark:text-slate-100 placeholder:text-slate-300 focus:ring-0"
            placeholder="Note Title"
            type="text"
            value="Project Strategy 2024"
          />
          <div class="prose prose-slate dark:prose-invert max-w-none">
            <textarea
              class="w-full bg-transparent border-none p-0 min-h-[400px] text-lg leading-relaxed text-slate-700 dark:text-slate-300 placeholder:text-slate-300 focus:ring-0 resize-none"
              placeholder="Start typing your ideas here..."
            >Our primary focus for 2024 will be expanding the AI integration across the core product line.

Key Objectives:
1. Increase user retention by 25% through personalized AI insights.
2. Launch the "SmartNote Enterprise" tier for collaborative teams.
3. Optimize transcription latency to under 2 seconds.

Next steps include finalizing the Q1 roadmap and conducting stakeholder interviews. The vision is to move from a reactive tool to a proactive productivity partner.</textarea
            >
          </div>
        </div>
      </main>

      <section class="mt-auto border-t border-slate-100 dark:border-slate-800 bg-white dark:bg-background-dark shadow-[0_-4px_20px_rgba(0,0,0,0.03)] pb-safe">
        <div
          class="flex items-center justify-between px-4 py-2 border-b border-slate-50 dark:border-slate-900 overflow-x-auto no-scrollbar"
        >
          <div class="flex items-center gap-1">
            <button class="p-2 rounded hover:bg-slate-100 dark:hover:bg-slate-800 text-slate-600 dark:text-slate-400">
              <span class="material-symbols-outlined">format_bold</span>
            </button>
            <button class="p-2 rounded hover:bg-slate-100 dark:hover:bg-slate-800 text-slate-600 dark:text-slate-400">
              <span class="material-symbols-outlined">format_italic</span>
            </button>
            <button class="p-2 rounded hover:bg-slate-100 dark:hover:bg-slate-800 text-slate-600 dark:text-slate-400">
              <span class="material-symbols-outlined">format_list_bulleted</span>
            </button>
            <button class="p-2 rounded hover:bg-slate-100 dark:hover:bg-slate-800 text-slate-600 dark:text-slate-400">
              <span class="material-symbols-outlined">format_list_numbered</span>
            </button>
            <div class="w-[1px] h-6 bg-slate-200 dark:bg-slate-700 mx-1"></div>
            <button class="p-2 rounded hover:bg-slate-100 dark:hover:bg-slate-800 text-slate-600 dark:text-slate-400">
              <span class="material-symbols-outlined">image</span>
            </button>
            <button class="p-2 rounded hover:bg-slate-100 dark:hover:bg-slate-800 text-slate-600 dark:text-slate-400">
              <span class="material-symbols-outlined">attach_file</span>
            </button>
          </div>
          <button class="p-2 rounded text-primary hover:bg-primary/10">
            <span class="material-symbols-outlined">keyboard_hide</span>
          </button>
        </div>

        <div class="p-4 space-y-4">
          <div class="flex items-center justify-between">
            <div class="flex items-center gap-2">
              <div class="size-8 rounded-full bg-primary flex items-center justify-center text-white shadow-lg shadow-primary/30">
                <span class="material-symbols-outlined text-[18px]">auto_awesome</span>
              </div>
              <span class="text-sm font-bold text-slate-800 dark:text-slate-200">AI Assistant</span>
            </div>
            <button class="text-xs font-semibold text-primary">View History</button>
          </div>
          <div class="grid grid-cols-2 gap-2">
            <button
              class="flex items-center gap-2 px-3 py-3 rounded-xl bg-slate-50 dark:bg-slate-900 border border-slate-100 dark:border-slate-800 text-sm font-medium hover:border-primary/40 hover:bg-primary/5 transition-all group"
            >
              <span class="material-symbols-outlined text-primary group-hover:scale-110 transition-transform">summarize</span>
              <span>Summarize</span>
            </button>
            <button
              class="flex items-center gap-2 px-3 py-3 rounded-xl bg-slate-50 dark:bg-slate-900 border border-slate-100 dark:border-slate-800 text-sm font-medium hover:border-primary/40 hover:bg-primary/5 transition-all group"
            >
              <span class="material-symbols-outlined text-primary group-hover:scale-110 transition-transform">spellcheck</span>
              <span>Fix Grammar</span>
            </button>
            <button
              class="flex items-center gap-2 px-3 py-3 rounded-xl bg-slate-50 dark:bg-slate-900 border border-slate-100 dark:border-slate-800 text-sm font-medium hover:border-primary/40 hover:bg-primary/5 transition-all group"
            >
              <span class="material-symbols-outlined text-primary group-hover:scale-110 transition-transform">stylus_note</span>
              <span>Change Tone</span>
            </button>
            <button
              class="flex items-center gap-2 px-3 py-3 rounded-xl bg-slate-50 dark:bg-slate-900 border border-slate-100 dark:border-slate-800 text-sm font-medium hover:border-primary/40 hover:bg-primary/5 transition-all group"
            >
              <span class="material-symbols-outlined text-primary group-hover:scale-110 transition-transform">mms</span>
              <span>Transcribe</span>
            </button>
          </div>
        </div>

        <nav class="flex justify-around items-center px-4 py-3 border-t border-slate-100 dark:border-slate-800">
          <a class="flex flex-col items-center gap-1 text-primary" href="#">
            <span class="material-symbols-outlined">edit_note</span>
            <span class="text-[10px] font-bold">Notes</span>
          </a>
          <a class="flex flex-col items-center gap-1 text-slate-400" href="#">
            <span class="material-symbols-outlined">search</span>
            <span class="text-[10px] font-bold">Search</span>
          </a>
          <div class="relative -top-6">
            <button
              class="size-14 rounded-full bg-primary text-white flex items-center justify-center shadow-xl shadow-primary/40 border-4 border-white dark:border-background-dark"
            >
              <span class="material-symbols-outlined text-3xl">mic</span>
            </button>
          </div>
          <a class="flex flex-col items-center gap-1 text-slate-400" href="#">
            <span class="material-symbols-outlined">forum</span>
            <span class="text-[10px] font-bold">AI Chat</span>
          </a>
          <a class="flex flex-col items-center gap-1 text-slate-400" href="#">
            <span class="material-symbols-outlined">settings</span>
            <span class="text-[10px] font-bold">Settings</span>
          </a>
        </nav>
      </section>
    </div>
  </body>
</html>
