apiVersion: apps/v1
kind: Deployment
metadata:
  name: embedding
  namespace: rag
spec:
  selector:
    matchLabels:
      app: embedding
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  template:
    metadata:
      labels:
        app: embedding
    spec:
      terminationGracePeriodSeconds: 30
      containers:
        - name: embedding
          image: your-registry/embedding:latest
          resources:
            requests:
              cpu: "500m"
              memory: 512Mi
            limits:
              cpu: "2"
              memory: 2Gi
---
