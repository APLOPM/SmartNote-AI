apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: rag-kafka-autoscaling-alerts
  namespace: monitoring
spec:
  groups:
    - name: rag-kafka-consumer-lag
      rules:
        - alert: KafkaConsumerLagHigh
          expr: kafka_consumergroup_lag_sum{consumergroup="embedding-service-v1"} > 10000
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "Embedding consumer lag is high"
            description: "Lag is above 10,000 for 5 minutes."

        - alert: KafkaRebalanceTooFrequent
          expr: increase(kafka_consumergroup_rebalance_total{consumergroup="embedding-service-v1"}[10m]) > 5
          for: 1m
          labels:
            severity: warning
          annotations:
            summary: "Kafka rebalance frequency is high"
            description: "More than 5 rebalances in 10 minutes."

        - alert: EmbeddingReplicaAtMax
          expr: kube_deployment_status_replicas{namespace="rag", deployment="embedding"} >= 24
          for: 10m
          labels:
            severity: critical
          annotations:
            summary: "Embedding deployment at max replicas"
            description: "Embedding replicas stuck at max (24) for 10 minutes."
