apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: embedding-scaler
  namespace: rag
spec:
  scaleTargetRef:
    name: embedding

  minReplicaCount: 2
  maxReplicaCount: 24 # MUST be <= memory.ingested partition count

  pollingInterval: 30
  cooldownPeriod: 120

  advanced:
    horizontalPodAutoscalerConfig:
      behavior:
        scaleDown:
          stabilizationWindowSeconds: 300

  triggers:
    - type: kafka
      metadata:
        bootstrapServers: kafka:9092
        consumerGroup: embedding-service-v1
        topic: memory.ingested
        lagThreshold: "500"
        activationLagThreshold: "50"
---
apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: retrieval-scaler
  namespace: rag
spec:
  scaleTargetRef:
    name: retrieval

  minReplicaCount: 2
  maxReplicaCount: 48 # MUST be <= query.request partition count

  pollingInterval: 30
  cooldownPeriod: 120

  advanced:
    horizontalPodAutoscalerConfig:
      behavior:
        scaleDown:
          stabilizationWindowSeconds: 300

  triggers:
    - type: kafka
      metadata:
        bootstrapServers: kafka:9092
        consumerGroup: retrieval-service-v1
        topic: query.request
        lagThreshold: "200"
        activationLagThreshold: "20"
