apiVersion: batch/v1
kind: Job
metadata:
  name: prisma-migrate
  labels:
    app.kubernetes.io/name: prisma-migrate
spec:
  backoffLimit: 1
  template:
    spec:
      restartPolicy: Never
      containers:
        - name: migrate
          image: __API_IMAGE__
          command: ["npx", "prisma", "migrate", "deploy"]
          envFrom:
            - secretRef:
                name: db-secret
